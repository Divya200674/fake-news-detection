<!DOCTYPE html>
<html>
<head>
  <title>Fake News AI</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="card">

  <h1>Fake News AI Detector</h1>

  <div class="buttons">
    <button onclick="setMode('text')">Text</button>
    <button onclick="setMode('image')">Image</button>
    <button onclick="setMode('video')">Video</button>
    <button onclick="setMode('mixed')">Mixed</button>
  </div>

  <div id="textBox">
    <textarea id="newsInput" placeholder="Enter news text..."></textarea>
  </div>

  <div id="fileBox" style="display:none;">
    <input type="file" id="mediaInput">
  </div>

  <button onclick="analyze()">Analyze</button>

  <div id="result"></div>

</div>

<script src="app.js"></script>
</body>
</html>
